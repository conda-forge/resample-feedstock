{% set name = "resample" %}
{% set version = "1.10.2" %}
{% set python_min = "3.10" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/resample-{{ version }}.tar.gz
  sha256: a61821d9456517305892df16f935d2712ffc7d05633ecb1c9d744bdc9f672c31

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61
    - setuptools-scm >=8.0
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.21
    - scipy >=1.10

test:
  source_files:
    - tests
  requires:
    - python {{ python_min }}
    - pytest
    - pip
  imports:
    - resample
  commands:
    - python -m pytest tests
    - pip check

about:
  home: https://github.com/scikit-hep/resample
  summary: Tools for randomization-based inference in Python
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/scikit-hep/resample
  doc_url: http://resample.readthedocs.io/

extra:
  recipe-maintainers:
    - dsaxton
    - HDembinski
    - conda-forge/scikit-hep
